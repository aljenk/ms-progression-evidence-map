<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MS Progression Evidence Map</title>
    <link rel="stylesheet" href="site/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="kicker">Living evidence map</p>
        <h1>MS Progression Evidence Map</h1>
      </div>
      <div class="repo-status" id="repoStatus">Data laden</div>
    </header>

    <main class="app-shell">
      <section class="stats-grid" aria-label="Samenvatting">
        <div class="metric">
          <span class="metric-label">Records</span>
          <strong id="metricRecords">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Brongecheckt of later</span>
          <strong id="metricChecked">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Expertreview gevraagd</span>
          <strong id="metricExpert">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">MS Research items</span>
          <strong id="metricMsResearch">0</strong>
        </div>
      </section>

      <section class="controls" aria-label="Filters">
        <label class="search-box">
          <span>Zoeken</span>
          <input id="searchInput" type="search" placeholder="Titel, ID, uitkomst of bron">
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter">
            <option value="all">Alle statussen</option>
          </select>
        </label>
        <label>
          <span>Categorie</span>
          <select id="categoryFilter">
            <option value="all">Alle categorieen</option>
          </select>
        </label>
        <label>
          <span>Bewijsniveau</span>
          <select id="levelFilter">
            <option value="all">Alle niveaus</option>
          </select>
        </label>
      </section>

      <section class="workspace">
        <aside class="record-list" aria-label="Evidence records">
          <div class="list-head">
            <h2>Evidence records</h2>
            <span id="resultCount">0</span>
          </div>
          <div id="recordList" class="cards"></div>
        </aside>

        <section class="detail-pane" aria-live="polite">
          <div id="recordDetail" class="detail-content">
            <p class="empty-state">Selecteer een record.</p>
          </div>
        </section>
      </section>
    </main>

    <footer class="footer">
      <span>Researchinformatie, geen medisch advies.</span>
      <a href="MEDICAL-DISCLAIMER.md">Disclaimer</a>
      <a href="LICENSE.md">Licentie</a>
      <a href="data/index.csv">Data-index</a>
    </footer>

    <script src="site/app.js" defer></script>
  </body>
</html>
